name: CI

on:
  push:
    branches: [main]
  pull_request:

# 同一分支的旧运行取消，节省 CI 时间。
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: quality (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["22", "24"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

  build:
    name: build artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install
        run: npm ci

      # 只做可移植的 bundle 构建；Electron 安装包（签名/多平台打包）仍不在每次 PR 上跑。
      - name: Build CLI
        run: npm run build:cli

      - name: Build Electron app
        run: npm run build:app

      - name: Build VSCode extension
        run: npm run build:vscode
